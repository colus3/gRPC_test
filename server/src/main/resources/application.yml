spring:
  application:
    name: grpc-book-server
  datasource:
    url: jdbc:mysql://localhost:3306/bookdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: bookuser
    password: bookpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

server:
  port: 8081

logging:
  level:
    com.test.grpc_test.server: DEBUG
    io.grpc: INFO